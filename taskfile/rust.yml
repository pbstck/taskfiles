version: '3'

internal: true

vars:
  DEFAULT_RUST_WORKSPACE_DIR: '{{.ROOT_DIR}}/code/rust'
  RUST_WORKSPACE_DIR: '{{.RUST_WORKSPACE_DIR | default .DEFAULT_RUST_WORKSPACE_DIR}}'
  TEST_OUTPUT_DIR: '{{.TEST_OUTPUT_DIR | default "." }}'


includes:
  common:
    taskfile: common.yml
    internal: true

tasks:
  build:
    vars:
      TARGET_ARCH: '{{if .ARM}}arm64{{else}}amd64{{end}}'
      BUILDER: '{{if eq .TARGET_ARCH ARCH}}cargo{{else}}cross{{end}}'
      TARGET: '{{if .ARM}}aarch64-unknown-linux-{{if .MUSL}}musl{{else}}gnu{{end}}{{else}}x86_64-unknown-linux-{{if .MUSL}}musl{{else}}gnu{{end}}{{end}}'
    deps: [ common:bin ]
    requires:
      vars: [ BINARIES_NAME, RUST_WORKSPACE_DIR ]
    cmds:
      - '{{.BUILDER}} build --target {{.TARGET}} {{if eq .IS_RELEASE "true"}}--release{{end}} --bin {{ .BINARIES_NAME | replace " " " --bin "}}'
      - for: { var: BINARIES_NAME }
        cmd: cp {{.RUST_WORKSPACE_DIR}}/target/{{.TARGET}}/{{if eq .IS_RELEASE "true"}}release{{else}}debug{{end}}/{{.ITEM}} ./bootstrap && zip -r {{.ROOT_DIR}}/bin/{{.ITEM}}.zip ./bootstrap

  test:
    cmds:
      - cargo test

  test/coverage:
    cmd: cargo tarpaulin --output-dir {{.TEST_OUTPUT_DIR}} --out Xml --lib  --skip-clean


  lint/check:
    cmds:
      - cargo fmt -- --check
      - cargo clippy -- -D warnings

  lint/format:
    cmds:
      - cargo fmt
      - cargo clippy -- -D warnings


  artifact/mock:
    deps: [ common:bin ]
    cmds:
      - for: { var: BINARIES_NAME }
        cmd: touch {{.ROOT_DIR}}/bin/{{.ITEM}}.zip

  artifact/deliver:
    cmds:
      - for: { var: BINARIES_NAME }
        task: common:artifact/deliver
        vars: { BINARY_NAME: "{{.ITEM}}" }

  artifact/retrieve:
    cmds:
      - for: { var: BINARIES_NAME }
        task: common:artifact/retrieve
        vars: { BINARY_NAME: "{{.ITEM}}" }
